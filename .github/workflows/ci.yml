name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Instrumentation library + Flask API + CLI ───────────────────────────
  test-src:
    name: Test — Instrumentation & Flask API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Create log directories
        run: mkdir -p logs/system logs/samples

      - name: Run tests
        env:
          LOGS_ROOT_DIR: logs
          OPENAI_API_KEY: test-sk-not-real
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-src
          path: src/coverage.xml

  # ── 2. FastAPI microservice ────────────────────────────────────────────────
  test-microservice:
    name: Test — Microservice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: microservice/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: test-sk-not-real
          LOGS_ROOT_DIR: /tmp/svc-test-logs
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-microservice
          path: microservice/coverage.xml

  # ── 3. Docker build — instrumentation API ─────────────────────────────────
  docker-src:
    name: Docker Build — Instrumentation API
    runs-on: ubuntu-latest
    needs: test-src

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: false
          tags: ai-observability:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Docker build — microservice ────────────────────────────────────────
  docker-microservice:
    name: Docker Build — Microservice
    runs-on: ubuntu-latest
    needs: test-microservice

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./microservice
          push: false
          tags: ai-observability-svc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
